services:
  backend:
    image: node:20
    working_dir: /app/backend
    command: sh -c "npm install && npm run db:push && npm run db:seed && npm run dev"
    volumes:
      - .:/app
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "file:./dev.db"
      PORT: "4000"
  frontend:
    image: node:20
    working_dir: /app/frontend
    command: sh -c "npm install && ./node_modules/.bin/next dev -p 3000 -H 0.0.0.0"
    volumes:
      - .:/app
      - /app/frontend/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4000"